<!DOCTYPE html>
<html>
<head>
  <title>3D Modellerim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="https://unpkg.com/@google/model-viewer@2.1.1/dist/model-viewer.min.js"></script>
  <style>
    model-viewer { width: 100%; height: 400px; margin: 20px 0; display: block; }
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    h3 { margin-top: 30px; }
  </style>
</head>
<body>
  <h1>3D Modellerim</h1>
  <div id="models-container"></div>

  <script>
    const repoOwner = '3D-modeller';
    const repoName = 'bySIRRI';
    const folderPath = 'modeller';
    
    fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`)
      .then(res => res.json())
      .then(files => {
        console.log('Dosyalar:', files);
        const container = document.getElementById('models-container');
        
        files
  .filter(f => f.name.endsWith('.glb') || f.name.endsWith('.gltf'))
  .forEach(file => {
    const title = document.createElement('h3');
    title.textContent = file.name.replace('.glb', '').replace('.gltf', '');
    container.appendChild(title);

    const viewer = document.createElement('model-viewer');
    viewer.src = file.download_url;
    viewer.setAttribute('camera-controls', '');
    viewer.setAttribute('auto-rotate', '');
    viewer.setAttribute('alt', file.name);
    container.appendChild(viewer);
  });
      })
      .catch(err => console.error('Hata:', err));
  </script>
</body>
</html>
